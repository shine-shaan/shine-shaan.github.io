name: Deploy Jekyll and Notify IndexNow

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site

      # 배포 성공 후 IndexNow API에 직접 알림 전송
      - name: Notify IndexNow
        run: |
          curl -X GET "https://api.indexnow.org/indexnow?url=https://shine-shaan.github.io/&key=${{ secrets.INDEXNOW_KEY }}&keyLocation=https://shine-shaan.github.io/${{ secrets.INDEXNOW_KEY }}.txt"
      
