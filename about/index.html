        <p>고등학교 졸업과 동시에 개인사업으로 유기화학 필기를 위한 노트를 판매했습니다.

<br />
이후 몇 개의 스타트업을 경험하며 스스로가 즐겁게 할 수 있는 일을 찾았습니다.
<br />
제가 좋아하는 일은 <strong>연구하고 기록하는 과정을 돕는 것</strong>입니다.</p>
