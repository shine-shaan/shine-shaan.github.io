url: "https://shine-shaan.github.io/"
baseurl: ""
locale: ko-KR
title: Shaan Blog
email: shaan@sciencebro.kr
description: >- 
  blog of software develop and business log 
  문제 해결을 위한 수단을 연구하며 기록합니다
github_username: shine-shaan
minimal_mistakes_skin: default
search: true

markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
permalink: /:categories/:title/
paginate: 5 
paginate_path: /page:num/
timezone: Asia/Seoul

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  - jekyll-seo-tag

author:
  name   : "Shaan Lee"
  avatar : "/assets/images/shine-shaan-profile.jpg"
  bio    : "도전하고 배워가는 과정을 기록"
  links:
    - label: "LinkedIn"
      icon: "fas fa-fw fa-link"
      url: "https://www.linkedin.com/in/%EC%84%B8%ED%98%84-%EC%9D%B4-a35842281/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/shine-shaan/"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/shine-shaan"
    - label: "Privacy Policy"
      url: "https://shine-shaan.github.io/privacy/"
      icon: "fas fa-user-shield"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      words_per_minute: 80
      comments: true
      share: true
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-NE51XQKB89"

indexnow:
  endpoint: https://api.indexnow.org
  key: 946075e467535a78ee1844ec9b49bc73414914b9a86138449ddcefc151969482
  url_scheme: https
  host: shine-shaan.github.io
